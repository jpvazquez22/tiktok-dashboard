services:
  - type: web
    name: tiktok-dashboard
    runtime: python
    rootDir: tiktok-dashboard
    buildCommand: pip install -r requirements.txt && python -c "import nltk; nltk.download('vader_lexicon', quiet=True)"
    startCommand: gunicorn app:app --workers 1 --bind 0.0.0.0:$PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
